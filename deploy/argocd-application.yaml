apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: route-management-ui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Data-Space-Core/RouteManagementUI.git
    targetRevision: HEAD
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: route-management-ui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
