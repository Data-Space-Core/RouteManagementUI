apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: management-ui
  namespace: infra-gateway
spec:
  parentRefs:
    - name: infra
      namespace: infra-gateway
  hostnames:
    - "dil.collab-cloud.eu"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: management-ui
          namespace: management-ui
          port: 8000
